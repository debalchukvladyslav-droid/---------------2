<div id="view-settings" class="view-content">
    <div class="settings-hub-grid">
        <div class="panel settings-hub-card">
            <h3 class="settings-title">Ризик</h3>
            <p class="settings-copy">Дейлос застосовується до місяця, який зараз відкритий у календарі: <span id="settings-current-month-label" class="settings-month-label"></span>.</p>
            <div class="form-group settings-narrow">
                <label>Ліміт втрат на день ($)</label>
                <input type="number" id="setting-dayloss-limit" step="1" placeholder="Напр. -100">
            </div>
            <button class="btn-primary btn-auto" data-action="dayloss-save">Зберегти для цього місяця</button>
        </div>

        <div class="panel settings-hub-card">
            <h3 class="settings-title">Google Drive</h3>
            <p class="settings-copy">Папка для автоматичної синхронізації скріншотів.</p>
            <div class="settings-row">
                <button class="btn-secondary btn-auto" id="drive-connect-btn" data-action="drive-connect">Підключити Google Drive</button>
                <button class="btn-secondary btn-auto drive-disconnect-btn initially-hidden" id="drive-disconnect-btn" data-action="drive-disconnect">Вийти</button>
                <span id="drive-folder-info" class="drive-folder-info"></span>
            </div>
        </div>

        <div class="panel settings-hub-card">
            <h3 class="settings-title">Дані</h3>
            <p class="settings-copy">Резервна копія журналу або відновлення з JSON-файлу.</p>
            <div class="import-export-grid">
                <button class="btn-secondary flex-fill" data-action="export-data">Експорт БД</button>
                <button class="btn-secondary flex-fill" data-action="file-picker" data-target="file-input">Імпорт БД</button>
            </div>
        </div>
    </div>

    <div class="panel theme-settings-panel">
        <h3 class="panel-title">Вигляд</h3>

        <div class="theme-section">
            <label class="theme-section-label">Колірна тема</label>
            <div class="theme-cards" role="group">
                <label class="theme-card" data-theme="dark">
                    <input type="radio" name="theme" value="dark" id="theme-dark">
                    <span class="theme-card-preview theme-preview-dark"></span>
                    <span class="theme-card-name">Темна</span>
                </label>
                <label class="theme-card" data-theme="light">
                    <input type="radio" name="theme" value="light" id="theme-light">
                    <span class="theme-card-preview theme-preview-light"></span>
                    <span class="theme-card-name">Світла</span>
                </label>
                <label class="theme-card" data-theme="matrix">
                    <input type="radio" name="theme" value="matrix" id="theme-matrix">
                    <span class="theme-card-preview theme-preview-matrix"></span>
                    <span class="theme-card-name">Термінал</span>
                </label>
                <label class="theme-card" data-theme="dracula">
                    <input type="radio" name="theme" value="dracula" id="theme-dracula">
                    <span class="theme-card-preview theme-preview-dracula"></span>
                    <span class="theme-card-name">Dracula</span>
                </label>
                <label class="theme-card" data-theme="custom">
                    <input type="radio" name="theme" value="custom" id="theme-custom">
                    <span class="theme-card-preview theme-preview-custom">🎨</span>
                    <span class="theme-card-name">Своя</span>
                </label>
            </div>
        </div>

        <div id="custom-theme-block" class="custom-theme-block">
            <div class="theme-color-grid">
                <div class="theme-color-item">
                    <label>Фон</label>
                    <div class="color-input-wrapper"><input type="color" id="ct-bg-main" value="#0f172a"></div>
                </div>
                <div class="theme-color-item">
                    <label>Панелі</label>
                    <div class="color-input-wrapper"><input type="color" id="ct-bg-panel" value="#1e293b"></div>
                </div>
                <div class="theme-color-item">
                    <label>Текст</label>
                    <div class="color-input-wrapper"><input type="color" id="ct-text-main" value="#f8fafc"></div>
                </div>
                <div class="theme-color-item">
                    <label>Акцент</label>
                    <div class="color-input-wrapper"><input type="color" id="ct-accent" value="#3b82f6"></div>
                </div>
                <div class="theme-color-item">
                    <label>Плюс</label>
                    <div class="color-input-wrapper"><input type="color" id="ct-profit" value="#10b981"></div>
                </div>
                <div class="theme-color-item">
                    <label>Мінус</label>
                    <div class="color-input-wrapper"><input type="color" id="ct-loss" value="#ef4444"></div>
                </div>
            </div>
        </div>

        <div class="theme-section">
            <label class="theme-section-label">Шрифт</label>
            <div class="font-pills">
                <label class="font-pill"><input type="radio" name="font" value="inter" id="font-inter"><span>Inter</span></label>
                <label class="font-pill"><input type="radio" name="font" value="roboto" id="font-roboto"><span>Roboto</span></label>
                <label class="font-pill"><input type="radio" name="font" value="montserrat" id="font-montserrat"><span>Montserrat</span></label>
                <label class="font-pill"><input type="radio" name="font" value="playfair" id="font-playfair"><span>Playfair</span></label>
                <label class="font-pill"><input type="radio" name="font" value="mono" id="font-mono"><span>Mono</span></label>
            </div>
        </div>

        <button class="btn-primary btn-save-theme" data-action="theme-save">Зберегти стиль</button>
    </div>

    <div class="panel mentor-panel initially-hidden" id="mentor-trade-types-panel">
        <h3 class="settings-title settings-title-gold">Менторські типи трейдів</h3>
        <div id="settings-trade-types-list" class="settings-list"></div>
        <div class="settings-actions">
            <button class="btn-secondary btn-auto" data-action="trade-type-add">Додати тип</button>
            <button class="btn-primary btn-auto mentor-save-btn" data-action="trade-type-save">Зберегти типи</button>
        </div>
    </div>
</div>
