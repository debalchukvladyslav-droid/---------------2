<div id="view-playbook" class="view-content">
    <div class="panel">
        <div class="section-head-tight">
            <h3 class="section-title-accent">📖 Мій Плейбук</h3>
            <button class="btn-primary btn-auto" data-action="playbook-setup-add">+ Додати сетап</button>
        </div>
        <p class="playbook-intro">Опишіть свої ідеальні сетапи. AI буде використовувати це при аналізі скрінів і в чаті.</p>
        <div id="playbook-list"></div>
    </div>

    <div class="panel">
        <div class="section-head-tight">
            <h3 class="settings-title">Ситуації плейбуку</h3>
        </div>
        <p class="settings-copy-sm">Ситуації допомагають групувати сетапи: відкриття ринку, пробій рівня, трендовий день, новини тощо.</p>
        <div id="settings-situations-list" class="settings-list"></div>
        <div class="settings-actions">
            <button class="btn-secondary btn-auto" data-action="playbook-situation-add">Додати ситуацію</button>
            <button class="btn-primary btn-auto" data-action="playbook-situation-save">Зберегти ситуації</button>
        </div>
    </div>
</div>
