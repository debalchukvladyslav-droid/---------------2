<div id="view-mentor-review" class="view-content mentor-review-view">
    <div class="panel mentor-review-panel" id="mentor-review-root">
        <div class="mentor-review-head">
            <div>
                <h2 class="mentor-review-title">Рев'ю трейдерів</h2>
                <p class="mentor-review-sub">Статуси по трейдерах: зелене заповнено, сіре очікує, червоне потребує уваги.</p>
            </div>
            <button type="button" class="btn-primary" id="mr-refresh-btn">Оновити</button>
        </div>

        <div class="mentor-review-toolbar">
            <div class="mr-field mr-field-period">
                <span>Період</span>
                <input type="hidden" id="mr-period" value="today" autocomplete="off">
                <div class="mr-period" role="group" aria-label="Період рев'ю">
                    <button type="button" class="mr-period-btn active" data-mr-period="today">Сьогодні</button>
                    <button type="button" class="mr-period-btn" data-mr-period="3d">3 дні</button>
                    <button type="button" class="mr-period-btn" data-mr-period="week">Цей тиждень</button>
                    <button type="button" class="mr-period-btn" data-mr-period="month">Місяць</button>
                </div>
            </div>
        </div>

        <p id="mentor-review-meta" class="mentor-review-meta"></p>
        <div class="mentor-review-list" id="mentor-review-tbody"></div>
    </div>
</div>
