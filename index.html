<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trading Journal Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        bgMain: '#0b0f19',
                        bgPanel: '#111625',
                        accent: '#3b82f6',
                        accentHover: '#60a5fa',
                        profit: '#10b981',
                        loss: '#ef4444',
                        borderSubtle: 'rgba(255, 255, 255, 0.08)'
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body class="bg-bgMain text-gray-200 font-sans h-screen flex overflow-hidden antialiased selection:bg-accent/30 selection:text-white">

    <aside id="app-sidebar" class="w-64 bg-bgPanel border-r border-borderSubtle flex flex-col transition-all duration-300 z-40 relative">
        <div class="h-16 flex items-center px-5 border-b border-borderSubtle">
            <button onclick="window.toggleLeftSidebar?.()" class="p-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-colors mr-3">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
            </button>
            <span class="font-bold text-lg tracking-tight sidebar-text">TJ Pro</span>
        </div>

        <nav class="flex-1 py-4 px-3 flex flex-col gap-1 overflow-y-auto">
            <button id="main-btn-dash" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-gray-100 hover:bg-white/5 transition-all group active-tab-style" onclick="switchMainTab('dash')">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                <span class="sidebar-text">Дашборд</span>
            </button>
            
            <button id="main-btn-stats" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-gray-100 hover:bg-white/5 transition-all group" onclick="switchMainTab('stats')">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
                <span class="sidebar-text">Статистика</span>
            </button>

            <button id="main-btn-trades" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-gray-100 hover:bg-white/5 transition-all group" onclick="switchMainTab('trades')">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                <span class="sidebar-text">Угоди</span>
            </button>

            <button id="main-btn-screens" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-gray-100 hover:bg-white/5 transition-all group" onclick="switchMainTab('screens')">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span class="sidebar-text">Скріншоти</span>
            </button>

            <button id="main-btn-ai" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-gray-100 hover:bg-white/5 transition-all group" onclick="switchMainTab('ai')">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                <span class="sidebar-text">AI Ментор</span>
            </button>

            <div class="h-px bg-borderSubtle my-2 mx-2"></div>

            <button id="main-btn-playbook" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-gray-100 hover:bg-white/5 transition-all group" onclick="switchMainTab('playbook')">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                <span class="sidebar-text">Плейбук</span>
            </button>

            <button id="main-btn-settings" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-gray-100 hover:bg-white/5 transition-all group" onclick="switchMainTab('settings')">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span class="sidebar-text">Налаштування</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 relative">
        
        <header class="h-16 flex items-center justify-between px-8 bg-bgPanel/80 backdrop-blur-md border-b border-borderSubtle z-30 sticky top-0">
            <h2 id="page-title" class="text-xl font-semibold text-gray-100 tracking-tight">Дашборд</h2>
            
            <div class="flex items-center gap-3">
                <button id="team-toggle-btn" class="px-4 py-2 text-sm font-medium text-gray-300 bg-white/5 border border-white/10 rounded-lg hover:bg-white/10 hover:text-white transition-all shadow-sm" onclick="openTeamSidebar()">👥 Команда</button>
                <button id="sidebar-toggle-btn" class="px-5 py-2 text-sm font-semibold text-white bg-accent border border-accent rounded-lg hover:bg-accentHover hover:-translate-y-0.5 transition-all shadow-[0_0_15px_rgba(59,130,246,0.4)]" onclick="toggleRightSidebar()">+ Додати трейд</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 relative">
            
            <div id="view-dash" class="view-content block">
                <div class="bg-bgPanel border border-borderSubtle rounded-2xl p-6 shadow-xl">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex gap-3">
                            <select id="month-select" class="bg-bgMain text-gray-200 border border-borderSubtle rounded-lg px-3 py-1.5 text-sm outline-none focus:border-accent" onchange="renderView()"></select>
                            <select id="year-select" class="bg-bgMain text-gray-200 border border-borderSubtle rounded-lg px-3 py-1.5 text-sm outline-none focus:border-accent" onchange="renderView()"></select>
                        </div>
                        <div class="flex gap-6 text-sm">
                            <div class="text-gray-400">Комісії: <span id="total-comm" class="text-gray-100 font-bold tabular-nums">0$</span></div>
                            <div class="text-gray-400">Net PnL: <span id="total-pnl" class="text-white font-bold tabular-nums text-base">0$</span></div>
                        </div>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-[45px_repeat(5,1fr)] gap-3"></div>
                </div>
            </div>

            <div id="view-stats" class="view-content hidden">
                <h3 class="text-gray-400">Тут буде статистика (старий код підхопить)</h3>
            </div>
            
            <div id="view-trades" class="view-content hidden"></div>
            <div id="view-screens" class="view-content hidden"></div>
            <div id="view-ai" class="view-content hidden"></div>
            <div id="view-playbook" class="view-content hidden"></div>
            <div id="view-settings" class="view-content hidden"></div>

        </div>
    </main>

    <div id="form-sidebar-backdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300" onclick="window.toggleRightSidebar?.()"></div>
    
    <aside id="form-sidebar" class="fixed top-0 right-0 h-full w-[400px] bg-bgPanel border-l border-borderSubtle shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="flex items-center justify-between p-6 border-b border-borderSubtle">
            <h3 class="text-lg font-semibold text-accent">📝 Новий запис</h3>
            <button onclick="window.toggleRightSidebar?.()" class="text-gray-400 hover:text-white text-xl transition-colors">✖</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6">
            <div class="text-gray-400 text-sm mb-4">Форма дня (підхопиться старим JS)</div>
            
            <div class="mb-4">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Net PnL ($)</label>
                <input type="number" id="trade-pnl" class="w-full bg-bgMain border border-borderSubtle rounded-lg px-4 py-2.5 text-white focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-all" placeholder="0.00">
            </div>
            
            <button class="w-full mt-6 bg-accent hover:bg-accentHover text-white font-semibold py-3 rounded-xl shadow-lg shadow-accent/20 transition-all active:scale-[0.98]" onclick="saveEntry()">Зберегти день</button>
        </div>
    </aside>

    <script src="lw-charts.js"></script>
    <script type="module" src="js/main.js"></script>  
    
    <script>
        // Проста логіка для лівого меню
        window.toggleLeftSidebar = function() {
            const sidebar = document.getElementById('app-sidebar');
            const texts = document.querySelectorAll('.sidebar-text');
            
            if (sidebar.classList.contains('w-64')) {
                sidebar.classList.replace('w-64', 'w-20');
                texts.forEach(t => t.style.display = 'none');
            } else {
                sidebar.classList.replace('w-20', 'w-64');
                setTimeout(() => texts.forEach(t => t.style.display = 'block'), 150);
            }
        };

        // Логіка для правої панелі
        window.toggleRightSidebar = function() {
            const drawer = document.getElementById('form-sidebar');
            const backdrop = document.getElementById('form-sidebar-backdrop');
            
            if (drawer.classList.contains('translate-x-full')) {
                drawer.classList.remove('translate-x-full');
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.replace('opacity-0', 'opacity-100'), 10);
            } else {
                drawer.classList.add('translate-x-full');
                backdrop.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        };
        
        // Перемикання вкладок
        window.switchMainTab = function(tabId) {
            document.querySelectorAll('.view-content').forEach(el => {
                el.classList.remove('block');
                el.classList.add('hidden');
            });
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('view-' + tabId).classList.add('block');
            
            // Стиль активної кнопки
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-blue-500/10', 'text-accent', 'border-r-4', 'border-accent');
            });
            document.getElementById('main-btn-' + tabId).classList.add('bg-blue-500/10', 'text-accent', 'border-r-4', 'border-accent');
        };
    </script>
</body>
</html>
